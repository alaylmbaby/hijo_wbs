<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WBS · 간트 차트</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap');

:root{
  --bg:#F5F6F8;
  --surface:#FFFFFF;
  --surface-2:#FBFBFD;
  --border:#E3E6EC;
  --border-strong:#CBD1DC;
  --text-1:#161A22;
  --text-2:#5B6472;
  --text-3:#9AA2AF;
  --brand:#3752E0;
  --brand-soft:#EBEFFE;

  --c-upcoming:#98A2B3;
  --c-upcoming-soft:#EEF0F3;
  --c-ontrack:#2E6BFF;
  --c-ontrack-soft:#E7EEFF;
  --c-behind:#E08A00;
  --c-behind-soft:#FFF3DF;
  --c-overdue:#E1483C;
  --c-overdue-soft:#FDE9E7;
  --c-done:#1E9E5A;
  --c-done-soft:#E4F7ED;

  --row-h:46px;
  --day-w:36px;
  --radius-s:6px;
  --radius-m:10px;
  --radius-l:16px;
  --shadow-1:0 1px 2px rgba(20,24,33,.05), 0 1px 1px rgba(20,24,33,.04);
  --shadow-2:0 8px 24px rgba(20,24,33,.10);
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text-1);
  font-family:'Pretendard', -apple-system, sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{ font-family:'Pretendard', ui-monospace, monospace; }

/* ---------- App shell ---------- */
.app{
  width:100%;
  max-width:none;
  margin:0;
  padding:24px 24px 60px;
  min-height:100vh;
  box-sizing:border-box;
}
html, body{ overflow-x:hidden; }

.auth-bar{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:10px;
  margin-bottom:10px;
  min-height:34px;
}
.auth-hint{
  font-size:11px;
  color:var(--text-3);
  font-style:normal;
}
.user-chip{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:4px 6px 4px 4px;
  box-shadow:var(--shadow-1);
}
.user-avatar{
  width:26px;height:26px;
  border-radius:50%;
  object-fit:cover;
  background:var(--brand-soft);
}
.user-name{
  font-size:12.5px;
  font-weight:600;
  color:var(--text-1);
  max-width:160px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.logout-btn{
  border:none;
  background:var(--surface-2);
  color:var(--text-2);
  font-size:11px;
  font-weight:600;
  padding:5px 10px;
  border-radius:16px;
  cursor:pointer;
}
.logout-btn:hover{ background:var(--c-overdue-soft); color:var(--c-overdue); }

.author-avatar{
  width:20px;height:20px;
  border-radius:50%;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9.5px;
  font-weight:700;
  color:#fff;
  font-family:'Pretendard', sans-serif;
}

.topbar{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  margin-bottom:22px;
  flex-wrap:wrap;
}
.topbar .title-block .eyebrow{
  font-family:'Pretendard', monospace;
  font-size:11px;
  letter-spacing:.14em;
  color:var(--brand);
  text-transform:uppercase;
  margin:0 0 6px;
  font-weight:600;
}
.topbar h1{
  margin:0;
  font-family:'Do Hyeon', 'Pretendard', sans-serif;
  font-size:34px;
  font-weight:400;
  letter-spacing:-0.01em;
}
.topbar .sub{
  margin:6px 0 0;
  color:var(--text-2);
  font-size:13.5px;
}

.legend{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  align-items:center;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--text-2);
}
.legend-dot{
  width:9px;height:9px;border-radius:50%;
  flex-shrink:0;
}
.legend-divider{
  width:1px;
  height:14px;
  background:var(--border-strong);
  margin:0 2px;
}
.legend-swatch{
  width:12px;height:9px;
  border-radius:3px;
  flex-shrink:0;
}
.swatch-weekend{ background:rgba(152,162,179,0.35); }
.swatch-holiday{ background:rgba(225,72,60,0.35); }

/* ---------- Board (two panels) ---------- */
.board{
  display:flex;
  align-items:stretch;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-l);
  overflow:hidden;
  box-shadow:var(--shadow-1);
}

/* Left: task panel */
.task-panel{
  width:640px;
  min-width:420px;
  max-width:900px;
  flex-shrink:0;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:relative;
}
.panel-resizer{
  position:absolute;
  top:0; right:-4px;
  width:8px;
  height:100%;
  cursor:col-resize;
  z-index:10;
}
.panel-resizer::after{
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:3px; height:28px;
  border-radius:2px;
  background:var(--border-strong);
  opacity:0;
  transition:opacity .12s ease;
}
.panel-resizer:hover::after,
.panel-resizer.is-dragging::after{ opacity:1; }
.task-panel-head{
  height:60px;
  display:grid;
  grid-template-columns: minmax(0,1fr) 92px 92px 88px 58px;
  align-items:center;
  padding:0 14px;
  border-bottom:1px solid var(--border);
  background:var(--surface-2);
  font-size:11px;
  font-weight:600;
  color:var(--text-3);
  letter-spacing:.04em;
}
.task-panel-head span:nth-child(n+2){ text-align:center; }

.task-rows{ display:flex; flex-direction:column; }
.task-row{
  height:var(--row-h);
  display:grid;
  grid-template-columns: minmax(0,1fr) 92px 92px 88px 58px;
  align-items:center;
  padding:0 14px;
  border-bottom:1px solid var(--border);
  gap:6px;
}
.task-row:hover{ background:var(--surface-2); }

.task-name-cell{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.status-chip{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.task-name-input{
  border:none;
  background:transparent;
  font-size:13px;
  font-weight:500;
  color:var(--text-1);
  width:100%;
  min-width:0;
  padding:4px 2px;
  border-radius:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.task-name-input:hover{ background:var(--border); }
.task-name-input:focus{ outline:2px solid var(--brand); background:var(--surface); }

.del-btn{
  border:none;
  background:none;
  color:var(--text-3);
  cursor:pointer;
  font-size:14px;
  width:20px;height:20px;
  border-radius:5px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.del-btn:hover{ background:var(--c-overdue-soft); color:var(--c-overdue); }

.status-badge{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  font-size:10.5px;
  font-weight:700;
  padding:4px 7px;
  border-radius:20px;
  white-space:nowrap;
  font-family:'Pretendard', monospace;
  letter-spacing:.01em;
}
.badge-upcoming{ background:var(--c-upcoming-soft); color:var(--c-upcoming); }
.badge-ontrack{ background:var(--c-ontrack-soft); color:var(--c-ontrack); }
.badge-behind{ background:var(--c-behind-soft); color:var(--c-behind); }
.badge-overdue{ background:var(--c-overdue-soft); color:var(--c-overdue); }
.badge-done{ background:var(--c-done-soft); color:var(--c-done); }
.status-badge .dot{ width:6px;height:6px;border-radius:50%;flex-shrink:0; }

.mini-date, .mini-progress{
  border:1px solid transparent;
  background:transparent;
  font-family:'Pretendard', monospace;
  font-size:11px;
  color:var(--text-2);
  width:100%;
  text-align:center;
  border-radius:4px;
  padding:4px 2px;
}
.mini-date:hover, .mini-progress:hover{ border-color:var(--border-strong); }
.mini-date:focus, .mini-progress:focus{ outline:none; border-color:var(--brand); color:var(--text-1); }

/* Toolbar (top of task panel) */
.task-panel-toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 14px 12px;
  border-bottom:1px solid var(--border);
}
.toolbar-title{
  font-size:13px;
  font-weight:700;
  color:var(--text-1);
}
.add-toggle-btn{
  border:none;
  background:var(--brand);
  color:#fff;
  font-weight:700;
  font-size:12px;
  padding:7px 12px;
  border-radius:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
}
.add-toggle-btn:hover{ box-shadow:var(--shadow-2); transform:translateY(-1px); }
.add-toggle-btn:active{ transform:translateY(0); }
.add-toggle-btn.is-open{ background:var(--text-2); }

/* Inline add form (revealed under toolbar) */
.inline-add-form{
  padding:14px;
  background:var(--brand-soft);
  border-bottom:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:8px;
  animation:slideDown .16s ease;
}
@keyframes slideDown{
  from{ opacity:0; transform:translateY(-6px); }
  to{ opacity:1; transform:translateY(0); }
}
.inline-add-form .field-label{
  font-size:10.5px;
  color:var(--text-2);
  font-weight:700;
  letter-spacing:.04em;
  margin-bottom:2px;
}
.add-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}
.add-grid .two-col{
  display:grid;
  grid-template-columns:1fr 1fr 74px;
  gap:8px;
}
.inline-add-form input{
  border:1px solid var(--border-strong);
  border-radius:var(--radius-s);
  padding:8px 9px;
  font-size:12.5px;
  font-family:'Pretendard', sans-serif;
  background:var(--surface);
  color:var(--text-1);
  width:100%;
}
.inline-add-form input:focus{ outline:2px solid #fff; border-color:var(--brand); }
.inline-add-actions{
  display:flex;
  gap:8px;
  margin-top:2px;
}
.add-btn{
  flex:1;
  border:none;
  background:var(--brand);
  color:#fff;
  font-weight:700;
  font-size:12.5px;
  padding:9px 10px;
  border-radius:var(--radius-s);
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
}
.add-btn:hover{ box-shadow:var(--shadow-2); transform:translateY(-1px); }
.add-btn:active{ transform:translateY(0); }
.cancel-btn{
  border:1px solid var(--border-strong);
  background:var(--surface);
  color:var(--text-2);
  font-weight:600;
  font-size:12.5px;
  padding:9px 12px;
  border-radius:var(--radius-s);
  cursor:pointer;
}
.cancel-btn:hover{ background:var(--surface-2); }

/* Right: gantt panel */
.gantt-panel{
  flex:1;
  min-width:0;
  overflow-x:auto;
  overflow-y:hidden;
  background:var(--surface);
}
.gantt-inner{ position:relative; }

.gantt-header{
  height:60px;
  position:sticky;
  top:0;
  background:var(--surface-2);
  border-bottom:1px solid var(--border);
  z-index:3;
}
.month-row{ height:28px; position:relative; border-bottom:1px solid var(--border); }
.month-label{
  position:absolute;
  top:0; bottom:0;
  display:flex;
  align-items:center;
  padding-left:10px;
  font-size:11px;
  font-weight:700;
  color:var(--text-2);
  border-left:1px solid var(--border);
  font-family:'Pretendard', monospace;
}
.day-row{ height:32px; position:relative; }
.day-cell{
  position:absolute;
  top:0; bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:var(--text-3);
  font-family:'Pretendard', monospace;
}
.day-cell.weekend{ color:var(--text-2); font-weight:600; }
.day-cell.holiday{ color:var(--c-overdue); font-weight:700; }
.day-cell .dow{ font-size:8.5px; display:block; text-align:center; }

.gantt-body{ position:relative; }
.grid-col{
  position:absolute;
  top:0; bottom:0;
  border-right:1px solid var(--border);
}
.grid-col.weekend{ background:rgba(152,162,179,0.07); }
.grid-col.holiday{ background:rgba(225,72,60,0.09); }
.row-line{
  position:absolute;
  left:0; right:0;
  border-bottom:1px solid var(--border);
}

.today-line{
  position:absolute;
  top:0; bottom:0;
  width:0;
  border-left:2px dashed var(--brand);
  z-index:2;
  pointer-events:none;
}
.today-flag{
  position:absolute;
  top:-38px;
  left:6px;
  background:var(--brand);
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:3px 7px;
  border-radius:20px;
  white-space:nowrap;
  font-family:'Pretendard', monospace;
}
.today-flag::after{
  content:'';
  position:absolute;
  left:-3px; top:50%;
  width:6px;height:6px;
  background:var(--brand);
  border-radius:50%;
  transform:translateY(-50%);
}

.task-bar{
  position:absolute;
  height:28px;
  top:9px;
  border-radius:8px;
  display:flex;
  align-items:center;
  overflow:hidden;
  border:1.5px solid transparent;
  transition:left .18s ease, width .18s ease, box-shadow .12s ease;
  cursor:default;
}
.task-bar:hover{ box-shadow:var(--shadow-2); z-index:5; }
.bar-fill{
  position:absolute;
  left:0; top:0; bottom:0;
  border-radius:8px 0 0 8px;
  transition:width .2s ease;
  opacity:.9;
}
.bar-label{
  position:relative;
  z-index:1;
  padding:0 10px;
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  width:100%;
  color:var(--text-1);
  outline:none;
}
.bar-label.outside{
  position:absolute;
  left:100%;
  margin-left:8px;
  color:var(--text-2);
  width:max-content;
  padding:0;
}
.bar-label:focus{
  background:rgba(255,255,255,.9);
  box-shadow:0 0 0 2px var(--brand) inset;
  border-radius:4px;
}

.gantt-tooltip{
  position:absolute;
  z-index:30;
  transform:translate(-50%,-100%);
  background:rgba(22,26,34,0.82);
  color:#fff;
  font-size:11px;
  font-weight:600;
  padding:6px 10px;
  border-radius:6px;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity .12s ease;
}

.status-upcoming{ background:var(--c-upcoming-soft); border-color:var(--c-upcoming); }
.status-upcoming .bar-fill{ background:var(--c-upcoming); }
.status-ontrack{ background:var(--c-ontrack-soft); border-color:var(--c-ontrack); }
.status-ontrack .bar-fill{ background:var(--c-ontrack); }
.status-behind{ background:var(--c-behind-soft); border-color:var(--c-behind); }
.status-behind .bar-fill{ background:var(--c-behind); }
.status-overdue{ background:var(--c-overdue-soft); border-color:var(--c-overdue); }
.status-overdue .bar-fill{ background:var(--c-overdue); }
.status-done{ background:var(--c-done-soft); border-color:var(--c-done); }
.status-done .bar-fill{ background:var(--c-done); }

.dot-upcoming{ background:var(--c-upcoming); }
.dot-ontrack{ background:var(--c-ontrack); }
.dot-behind{ background:var(--c-behind); }
.dot-overdue{ background:var(--c-overdue); }
.dot-done{ background:var(--c-done); }

footer.note{
  margin-top:18px;
  font-size:11.5px;
  color:var(--text-3);
}

::-webkit-scrollbar{ height:10px; width:10px; }
::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:10px; }
::-webkit-scrollbar-track{ background:transparent; }

@media (max-width:840px){
  .board{ flex-direction:column; }
  .task-panel{ width:100% !important; max-width:none; border-right:none; border-bottom:1px solid var(--border); }
  .panel-resizer{ display:none; }
}
</style>
</head>
<body>
<div class="app">

  <div class="auth-bar">
    <div class="user-chip" id="userChip" style="display:none;">
      <img class="user-avatar" id="userAvatarImg" alt="" />
      <span class="user-name" id="userNameLabel"></span>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
    <div id="googleBtnContainer"></div>
    <span class="auth-hint" id="authHint">Google 로그인 준비 중…</span>
  </div>

  <div class="topbar">
    <div class="title-block">
      <p class="eyebrow">Work Breakdown Structure</p>
      <h1>히조's WBS</h1>
      <p class="sub">작업의 시작일·종료일을 입력하면 일정에 맞춰 막대가 그려지고, 진행 상태에 따라 색이 자동으로 바뀝니다.</p>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="board">
    <!-- LEFT: task list -->
    <div class="task-panel">
      <div class="task-panel-toolbar">
        <span class="toolbar-title">작업 목록</span>
        <button class="add-toggle-btn" id="toggleAddBtn">+ 새 작업</button>
      </div>

      <div class="inline-add-form" id="inlineAddForm" style="display:none;">
        <div class="field-label">새 작업 입력</div>
        <div class="add-grid">
          <input id="newName" type="text" placeholder="작업명 입력 (예: 요구사항 정의)" />
          <div class="two-col">
            <input id="newStart" type="date" />
            <input id="newEnd" type="date" />
            <input id="newProgress" type="number" min="0" max="100" placeholder="0%" />
          </div>
        </div>
        <div class="inline-add-actions">
          <button class="add-btn" id="addBtn">추가</button>
          <button class="cancel-btn" id="cancelAddBtn">취소</button>
        </div>
      </div>

      <div class="task-panel-head">
        <span>작업명</span>
        <span>시작일</span>
        <span>종료일</span>
        <span>상태</span>
        <span>진행률</span>
      </div>
      <div class="task-rows" id="taskRows"></div>
      <div class="panel-resizer" id="panelResizer" title="드래그해서 작업명 칸 너비 조절"></div>
    </div>

    <!-- RIGHT: gantt -->
    <div class="gantt-panel" id="ganttPanel">
      <div class="gantt-inner" id="ganttInner">
        <div class="gantt-header" id="ganttHeader">
          <div class="month-row" id="monthRow"></div>
          <div class="day-row" id="dayRow"></div>
        </div>
        <div class="gantt-body" id="ganttBody"></div>
      </div>
    </div>
  </div>

  <footer class="note">막대를 클릭해 이름을 바로 수정할 수 있어요 · 왼쪽 패널에서 시작일·종료일·진행률을 바꾸면 차트가 즉시 갱신됩니다.</footer>
</div>

<script>
(function(){

  /* ---------------- State ---------------- */
  const DAY = 86400000;
  const DAY_W = 36;
  const ROW_H = 46;

  function d(str){ // parse yyyy-mm-dd -> Date at local noon (avoid TZ drift)
    const [y,m,day] = str.split('-').map(Number);
    return new Date(y, m-1, day, 12,0,0,0);
  }
  function fmt(date){
    const y=date.getFullYear(), m=String(date.getMonth()+1).padStart(2,'0'), da=String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${da}`;
  }
  function addDays(date,n){ return new Date(date.getTime()+n*DAY); }
  function diffDays(a,b){ return Math.round((b-a)/DAY); }
  function isNonWorkingDay(date){
    const dow = date.getDay();
    if (dow===0 || dow===6) return true;
    return !!holidayCache[fmt(date)];
  }
  function workingDaysCount(s,e){
    let count = 0;
    let cur = new Date(s);
    while (cur <= e){
      if (!isNonWorkingDay(cur)) count++;
      cur = addDays(cur,1);
    }
    return count;
  }
  function todayNoon(){ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),t.getDate(),12,0,0,0); }

  /* ---------------- 공휴일 (Public holidays) ----------------
     Nager.Date 공개 API(무료, 키 불필요, CORS 지원)에서 대한민국 공휴일을 가져옵니다.
     https://date.nager.at/api/v3/PublicHolidays/{연도}/KR
     네트워크가 막혀 있거나 API가 응답하지 않으면 아래 FALLBACK_HOLIDAYS(2026년 기준)를 사용합니다.
  ------------------------------------------------------------- */
  const HOLIDAY_COUNTRY = 'KR';
  const holidayCache = {};      // 'YYYY-MM-DD' -> 공휴일 이름
  const loadedYears = new Set();
  const loadingYears = new Set();

  const FALLBACK_HOLIDAYS = {
    2026: {
      '2026-01-01':'신정', '2026-02-16':'설날 연휴', '2026-02-17':'설날', '2026-02-18':'설날 연휴',
      '2026-03-01':'삼일절', '2026-03-02':'대체공휴일(삼일절)', '2026-05-01':'노동절', '2026-05-05':'어린이날',
      '2026-05-24':'부처님오신날', '2026-05-25':'대체공휴일(부처님오신날)', '2026-06-06':'현충일',
      '2026-07-17':'제헌절', '2026-08-15':'광복절', '2026-08-17':'대체공휴일(광복절)',
      '2026-09-24':'추석 연휴', '2026-09-25':'추석', '2026-09-26':'추석 연휴',
      '2026-10-03':'개천절', '2026-10-05':'대체공휴일(개천절)', '2026-10-09':'한글날', '2026-12-25':'크리스마스',
    }
  };

  async function ensureHolidaysLoaded(minYear, maxYear){
    const years = [];
    for (let y=minYear; y<=maxYear; y++){
      if (!loadedYears.has(y) && !loadingYears.has(y)) years.push(y);
    }
    if (years.length === 0) return;
    years.forEach(y => loadingYears.add(y));

    await Promise.all(years.map(async (y) => {
      try{
        const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${y}/${HOLIDAY_COUNTRY}`);
        if (!res.ok) throw new Error('holiday api error');
        const data = await res.json();
        data.forEach(h => { holidayCache[h.date] = h.localName || h.name; });
      }catch(err){
        if (FALLBACK_HOLIDAYS[y]) Object.assign(holidayCache, FALLBACK_HOLIDAYS[y]);
      }finally{
        loadedYears.add(y);
        loadingYears.delete(y);
      }
    }));

    render(); // 공휴일 데이터가 도착하면 다시 그려서 색을 반영
  }

  let uid = 1;
  let currentUser = null; // { name, email, picture }

  let tasks = [
    { id: uid++, name:'요구사항 정의',   start:'2026-07-01', end:'2026-07-06', progress:100, author:'김민준' },
    { id: uid++, name:'화면 설계 (UX)',  start:'2026-07-06', end:'2026-07-13', progress:80,  author:'이서연' },
    { id: uid++, name:'디자인 시안',     start:'2026-07-10', end:'2026-07-18', progress:45,  author:'이서연' },
    { id: uid++, name:'프론트엔드 개발', start:'2026-07-15', end:'2026-07-29', progress:20,  author:'박도윤' },
    { id: uid++, name:'백엔드 개발',     start:'2026-07-15', end:'2026-08-02', progress:10,  author:'최지훈' },
    { id: uid++, name:'통합 테스트',     start:'2026-07-30', end:'2026-08-06', progress:0,   author:'박도윤' },
    { id: uid++, name:'배포 및 오픈',    start:'2026-08-07', end:'2026-08-10', progress:0,   author:'김민준' },
  ];

  // deterministic color for an author's avatar
  const AVATAR_COLORS = ['#3752E0','#1E9E5A','#E08A00','#B23AEE','#E1483C','#0E9488','#C2410C'];
  function authorColor(name){
    let hash = 0;
    for (let i=0;i<name.length;i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }
  function authorInitial(name){
    return (name || '?').trim().charAt(0).toUpperCase();
  }

  const STATUS = {
    upcoming: {label:'예정',        cls:'status-upcoming', dot:'dot-upcoming', badge:'badge-upcoming'},
    ontrack:  {label:'정상 진행',   cls:'status-ontrack',  dot:'dot-ontrack',  badge:'badge-ontrack'},
    behind:   {label:'지연 위험',   cls:'status-behind',   dot:'dot-behind',   badge:'badge-behind'},
    overdue:  {label:'기한 초과',   cls:'status-overdue',  dot:'dot-overdue',  badge:'badge-overdue'},
    done:     {label:'완료',        cls:'status-done',     dot:'dot-done',     badge:'badge-done'},
  };

  function getStatus(task){
    const today = todayNoon();
    const s = d(task.start), e = d(task.end);
    const p = Number(task.progress)||0;

    if (p >= 100) return 'done';
    if (today < s) return 'upcoming';
    if (today > e) return 'overdue';

    const total = Math.max(1, diffDays(s,e)+1);
    const elapsed = Math.min(total, diffDays(s,today)+1);
    const expected = (elapsed/total)*100;
    return (p + 6 >= expected) ? 'ontrack' : 'behind';
  }

  /* ---------------- Render ---------------- */
  const legendEl = document.getElementById('legend');
  const taskRowsEl = document.getElementById('taskRows');
  const monthRowEl = document.getElementById('monthRow');
  const dayRowEl = document.getElementById('dayRow');
  const ganttBodyEl = document.getElementById('ganttBody');
  const ganttInnerEl = document.getElementById('ganttInner');
  const ganttHeaderEl = document.getElementById('ganttHeader');

  function renderLegend(){
    const statusHtml = Object.values(STATUS).map(s =>
      `<div class="legend-item"><span class="legend-dot ${s.dot}"></span>${s.label}</div>`
    ).join('');
    const dayTypeHtml = `
      <div class="legend-item"><span class="legend-swatch swatch-weekend"></span>주말</div>
      <div class="legend-item"><span class="legend-swatch swatch-holiday"></span>공휴일</div>`;
    legendEl.innerHTML = statusHtml + '<span class="legend-divider"></span>' + dayTypeHtml;
  }

  function getRange(){
    if (tasks.length === 0){
      const t = todayNoon();
      return { min: addDays(t,-7), max: addDays(t,21) };
    }
    let min = d(tasks[0].start), max = d(tasks[0].end);
    tasks.forEach(t=>{
      const s=d(t.start), e=d(t.end);
      if (s<min) min=s;
      if (e>max) max=e;
    });
    return { min: addDays(min,-3), max: addDays(max,5) };
  }

  function render(){
    const { min, max } = getRange();
    const totalDays = diffDays(min,max)+1;
    const totalW = totalDays*DAY_W;
    const today = todayNoon();

    ensureHolidaysLoaded(min.getFullYear(), max.getFullYear());

    ganttInnerEl.style.width = totalW + 'px';
    ganttHeaderEl.style.width = totalW + 'px';

    /* ---- header: months ---- */
    monthRowEl.innerHTML = '';
    let cursor = new Date(min);
    let offset = 0;
    while (offset < totalDays){
      const y = cursor.getFullYear(), m = cursor.getMonth();
      const monthStart = new Date(y,m,1);
      const monthEndExclusive = new Date(y,m+1,1);
      const segStart = offset===0 ? min : cursor;
      const segEndDate = monthEndExclusive < addDays(min,totalDays) ? monthEndExclusive : addDays(min,totalDays);
      const segDays = diffDays(segStart, segEndDate);
      const left = diffDays(min, segStart)*DAY_W;
      const w = segDays*DAY_W;

      const label = document.createElement('div');
      label.className='month-label';
      label.style.left = left+'px';
      label.style.width = w+'px';
      label.textContent = `${y}년 ${m+1}월`;
      monthRowEl.appendChild(label);

      cursor = segEndDate;
      offset = diffDays(min, cursor);
    }

    /* ---- header: days ---- */
    dayRowEl.innerHTML = '';
    for (let i=0;i<totalDays;i++){
      const date = addDays(min,i);
      const dow = date.getDay();
      const isWeekend = dow===0 || dow===6;
      const holidayName = holidayCache[fmt(date)];
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isWeekend?' weekend':'') + (holidayName?' holiday':'');
      cell.style.left = (i*DAY_W)+'px';
      cell.style.width = DAY_W+'px';
      if (holidayName) cell.title = holidayName;
      const dowLabel = ['일','월','화','수','목','금','토'][dow];
      cell.innerHTML = `<span>${date.getDate()}<span class="dow">${dowLabel}</span></span>`;
      dayRowEl.appendChild(cell);
    }

    /* ---- body ---- */
    ganttBodyEl.innerHTML = '';
    const bodyHeight = Math.max(tasks.length,1)*ROW_H;
    ganttBodyEl.style.width = totalW+'px';
    ganttBodyEl.style.height = bodyHeight+'px';

    // weekend / holiday / grid columns
    for (let i=0;i<totalDays;i++){
      const date = addDays(min,i);
      const dow = date.getDay();
      const isWeekend = dow===0 || dow===6;
      const holidayName = holidayCache[fmt(date)];
      const col = document.createElement('div');
      col.className = 'grid-col' + (isWeekend?' weekend':'') + (holidayName?' holiday':'');
      col.style.left = (i*DAY_W)+'px';
      col.style.width = DAY_W+'px';
      if (holidayName) col.title = holidayName;
      ganttBodyEl.appendChild(col);
    }
    // row separators
    tasks.forEach((t,i)=>{
      const line = document.createElement('div');
      line.className='row-line';
      line.style.top = ((i+1)*ROW_H)+'px';
      ganttBodyEl.appendChild(line);
    });

    // today line
    if (today>=min && today<=addDays(min,totalDays)){
      const line = document.createElement('div');
      line.className='today-line';
      line.style.left = (diffDays(min,today)*DAY_W + DAY_W/2)+'px';
      line.style.height = bodyHeight+'px';
      const flag = document.createElement('div');
      flag.className='today-flag';
      flag.textContent = `오늘 · ${today.getMonth()+1}/${today.getDate()}`;
      line.appendChild(flag);
      ganttBodyEl.appendChild(line);
    }

    // shared hover tooltip for task duration
    const durationTooltip = document.createElement('div');
    durationTooltip.className = 'gantt-tooltip';
    ganttBodyEl.appendChild(durationTooltip);

    // bars
    tasks.forEach((t,i)=>{
      const s=d(t.start), e=d(t.end);
      const left = diffDays(min,s)*DAY_W;
      const width = Math.max(DAY_W, (diffDays(s,e)+1)*DAY_W);
      const statusKey = getStatus(t);
      const status = STATUS[statusKey];
      const progress = Math.min(100, Math.max(0, Number(t.progress)||0));

      const bar = document.createElement('div');
      bar.className = `task-bar ${status.cls}`;
      const totalDaysCount = diffDays(s,e)+1;
      const workDaysCount = workingDaysCount(s,e);
      const barLeft = left+2, barWidth = width-4, barTop = i*ROW_H + 9;
      bar.style.left = barLeft+'px';
      bar.style.width = barWidth+'px';
      bar.style.top = barTop+'px';

      bar.addEventListener('mouseenter', ()=>{
        durationTooltip.textContent = `(총 일수 : ${workDaysCount}일, 주말 포함 : ${totalDaysCount}일)`;
        durationTooltip.style.left = (barLeft + barWidth/2) + 'px';
        durationTooltip.style.top = (barTop - 8) + 'px';
        durationTooltip.style.opacity = '1';
      });
      bar.addEventListener('mouseleave', ()=>{
        durationTooltip.style.opacity = '0';
      });

      const fill = document.createElement('div');
      fill.className='bar-fill';
      fill.style.width = progress+'%';
      bar.appendChild(fill);

      const label = document.createElement('div');
      const narrow = width < 90;
      label.className = 'bar-label' + (narrow?' outside':'');
      label.contentEditable = 'true';
      label.spellcheck = false;
      label.textContent = t.name;
      label.addEventListener('blur', ()=>{
        t.name = label.textContent.trim() || t.name;
        renderTaskRows();
      });
      label.addEventListener('keydown', (ev)=>{
        if (ev.key==='Enter'){ ev.preventDefault(); label.blur(); }
      });
      bar.appendChild(label);

      ganttBodyEl.appendChild(bar);
    });

    renderTaskRows();
  }

  function renderTaskRows(){
    taskRowsEl.innerHTML = '';
    taskRowsEl.style.height = (Math.max(tasks.length,1)*ROW_H)+'px';

    tasks.forEach(t=>{
      const statusKey = getStatus(t);
      const status = STATUS[statusKey];

      const row = document.createElement('div');
      row.className='task-row';
      row.style.height = ROW_H+'px';

      // name cell
      const nameCell = document.createElement('div');
      nameCell.className='task-name-cell';

      const avatar = document.createElement('span');
      avatar.className='author-avatar';
      const authorName = t.author || '익명';
      avatar.style.background = authorColor(authorName);
      avatar.textContent = authorInitial(authorName);
      avatar.title = `작성자: ${authorName}`;

      const nameInput = document.createElement('input');
      nameInput.className='task-name-input';
      nameInput.value = t.name;
      nameInput.title = t.name;
      nameInput.addEventListener('change', ()=>{ t.name=nameInput.value; nameInput.title=t.name; render(); });

      const del = document.createElement('button');
      del.className='del-btn';
      del.innerHTML='&times;';
      del.title='작업 삭제';
      del.addEventListener('click', ()=>{ tasks = tasks.filter(x=>x.id!==t.id); render(); });

      nameCell.appendChild(avatar);
      nameCell.appendChild(nameInput);
      nameCell.appendChild(del);

      // start date cell
      const startInput = document.createElement('input');
      startInput.type='date'; startInput.className='mini-date'; startInput.value=t.start;
      startInput.addEventListener('change', ()=>{ t.start=startInput.value; render(); });

      // end date cell
      const endInput = document.createElement('input');
      endInput.type='date'; endInput.className='mini-date'; endInput.value=t.end;
      endInput.addEventListener('change', ()=>{ t.end=endInput.value; render(); });

      // status cell
      const statusCell = document.createElement('div');
      statusCell.className = `status-badge ${status.badge}`;
      statusCell.innerHTML = `<span class="dot ${status.dot}"></span>${status.label}`;

      // progress cell
      const progInput = document.createElement('input');
      progInput.type='number'; progInput.min=0; progInput.max=100;
      progInput.className='mini-progress';
      progInput.value = t.progress;
      progInput.addEventListener('change', ()=>{
        let v = Number(progInput.value);
        if (isNaN(v)) v=0;
        v = Math.min(100, Math.max(0,v));
        t.progress = v; render();
      });

      row.appendChild(nameCell);
      row.appendChild(startInput);
      row.appendChild(endInput);
      row.appendChild(statusCell);
      row.appendChild(progInput);
      taskRowsEl.appendChild(row);
    });
  }

  /* ---------------- Add task (inline toggle form) ---------------- */
  const toggleAddBtn = document.getElementById('toggleAddBtn');
  const inlineAddForm = document.getElementById('inlineAddForm');
  const cancelAddBtn = document.getElementById('cancelAddBtn');
  const nameEl = document.getElementById('newName');
  const startEl = document.getElementById('newStart');
  const endEl = document.getElementById('newEnd');
  const progEl = document.getElementById('newProgress');

  function openAddForm(){
    inlineAddForm.style.display = 'flex';
    toggleAddBtn.classList.add('is-open');
    toggleAddBtn.textContent = '닫기';
    nameEl.focus();
  }
  function closeAddForm(){
    inlineAddForm.style.display = 'none';
    toggleAddBtn.classList.remove('is-open');
    toggleAddBtn.textContent = '+ 새 작업';
    nameEl.value=''; startEl.value=''; endEl.value=''; progEl.value='';
  }

  toggleAddBtn.addEventListener('click', ()=>{
    const isOpen = inlineAddForm.style.display !== 'none';
    isOpen ? closeAddForm() : openAddForm();
  });
  cancelAddBtn.addEventListener('click', closeAddForm);

  document.getElementById('addBtn').addEventListener('click', ()=>{
    const name = nameEl.value.trim();
    const start = startEl.value;
    const end = endEl.value;
    let progress = Number(progEl.value);
    if (isNaN(progress)) progress = 0;

    if (!name || !start || !end){
      alert('작업명, 시작일, 종료일을 모두 입력해주세요.');
      return;
    }
    if (d(start) > d(end)){
      alert('종료일이 시작일보다 빠를 수 없습니다.');
      return;
    }

    tasks.push({ id: uid++, name, start, end, progress: Math.min(100,Math.max(0,progress)), author: currentUser ? currentUser.name : '익명' });
    // clear fields but keep the form open for quick successive entry
    nameEl.value=''; startEl.value=''; endEl.value=''; progEl.value='';
    nameEl.focus();
    render();
  });

  // Enter key inside the name field submits quickly
  nameEl.addEventListener('keydown', (ev)=>{
    if (ev.key==='Enter'){ ev.preventDefault(); document.getElementById('addBtn').click(); }
  });

  /* ---------------- Google 로그인 (작성자 구분용) ----------------
     1) https://console.cloud.google.com 에서 OAuth 2.0 클라이언트 ID(웹 애플리케이션)를 발급받으세요.
     2) "승인된 자바스크립트 원본"에 실제 배포 도메인(예: https://your-domain.com)을 등록하세요.
        - localhost 개발 서버는 등록하면 테스트용으로 사용 가능합니다.
        - 이 파일을 로컬에서 그냥 열거나(file://) Claude 미리보기 안에서는 동작하지 않습니다.
     3) 아래 GOOGLE_CLIENT_ID 값을 발급받은 클라이언트 ID로 교체하세요.
     로그인 정보는 서버에 저장되지 않고, 현재 브라우저 세션에서 "작성자" 표시용으로만 사용됩니다.
  --------------------------------------------------------------- */
  const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

  const userChip = document.getElementById('userChip');
  const userAvatarImg = document.getElementById('userAvatarImg');
  const userNameLabel = document.getElementById('userNameLabel');
  const logoutBtn = document.getElementById('logoutBtn');
  const googleBtnContainer = document.getElementById('googleBtnContainer');
  const authHint = document.getElementById('authHint');

  function parseJwt(token){
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(
      atob(base64).split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')
    );
    return JSON.parse(json);
  }

  function handleCredentialResponse(response){
    const payload = parseJwt(response.credential);
    currentUser = { name: payload.name, email: payload.email, picture: payload.picture };
    userAvatarImg.src = currentUser.picture;
    userNameLabel.textContent = currentUser.name;
    userChip.style.display = 'flex';
    googleBtnContainer.style.display = 'none';
    authHint.style.display = 'none';
  }

  logoutBtn.addEventListener('click', ()=>{
    currentUser = null;
    userChip.style.display = 'none';
    googleBtnContainer.style.display = 'block';
    if (window.google && google.accounts && google.accounts.id){
      google.accounts.id.disableAutoSelect();
    }
  });

  function initGoogleSignIn(){
    if (!(window.google && google.accounts && google.accounts.id)){
      authHint.textContent = 'Google 로그인 스크립트를 불러오지 못했어요. 네트워크 연결을 확인하세요.';
      return;
    }
    if (GOOGLE_CLIENT_ID.indexOf('YOUR_GOOGLE_CLIENT_ID') === 0){
      authHint.textContent = 'Google 로그인을 쓰려면 코드의 GOOGLE_CLIENT_ID를 발급받은 값으로 교체하세요.';
      return;
    }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
    });
    google.accounts.id.renderButton(googleBtnContainer, { theme:'outline', size:'medium', shape:'pill', text:'signin' });
    authHint.style.display = 'none';
  }

  /* ---------------- 작업 목록 패널 폭 조절 (드래그 리사이즈) ---------------- */
  (function(){
    const taskPanel = document.querySelector('.task-panel');
    const resizer = document.getElementById('panelResizer');
    const MIN_W = 420, MAX_W = 900;
    let dragging = false, startX = 0, startWidth = 0;

    resizer.addEventListener('mousedown', (e)=>{
      dragging = true;
      startX = e.clientX;
      startWidth = taskPanel.getBoundingClientRect().width;
      resizer.classList.add('is-dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e)=>{
      if (!dragging) return;
      const next = Math.min(MAX_W, Math.max(MIN_W, startWidth + (e.clientX - startX)));
      taskPanel.style.width = next + 'px';
    });
    window.addEventListener('mouseup', ()=>{
      if (!dragging) return;
      dragging = false;
      resizer.classList.remove('is-dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  })();

  /* ---------------- Init ---------------- */
  renderLegend();
  render();
  window.addEventListener('load', initGoogleSignIn);
  // fallback in case 'load' already fired before this script ran
  if (document.readyState === 'complete') initGoogleSignIn();

  // keep colors live (status can change as "today" passes midnight while page is open)
  setInterval(render, 60*1000);

})();
</script>
</body>
</html>
